<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Post Analytics</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="main-view">
      <div class="main-inner">

          <header class="page-head">
            <div>
              <h1>Posts</h1>
              <p class="subtext" data-last-updated>No posts loaded yet.</p>
            </div>
            <div class="topbar-actions">
              <button type="button" data-refresh>Refresh</button>
              <button type="button" data-seed class="secondary">Load Demo</button>
              <button type="button" data-import-btn class="secondary">Import JSON</button>
              <button type="button" data-clear class="danger">Clear</button>
              <input type="file" accept="application/json" data-file-input hidden />
            </div>
          </header>

          <section class="kpi-grid" aria-label="Overview metrics">
            <article class="kpi-card">
              <p>Total number of posts</p>
              <h2 data-kpi-posts>0</h2>
            </article>
            <article class="kpi-card">
              <p>Impressions</p>
              <h2 data-kpi-impressions>0</h2>
            </article>
            <article class="kpi-card">
              <p>Engagement rate</p>
              <h2 data-kpi-rate>0%</h2>
            </article>
            <article class="kpi-card">
              <p>Reactions</p>
              <h2 data-kpi-reactions>0</h2>
            </article>
            <article class="kpi-card">
              <p>Comments</p>
              <h2 data-kpi-comments>0</h2>
            </article>
            <article class="kpi-card">
              <p>Reposts</p>
              <h2 data-kpi-reposts>0</h2>
            </article>
          </section>

          <section class="filter-row" aria-label="Filters">
            <select data-filter-sort>
              <option value="latest">Latest</option>
              <option value="oldest">Oldest</option>
              <option value="impressions">Impressions</option>
              <option value="engagement">Engagement</option>
              <option value="engagementRate">Engagement Rate</option>
            </select>

            <select data-filter-type>
              <option value="all">All types</option>
            </select>

            <select data-filter-range>
              <option value="all">All time</option>
              <option value="30">Last 30 days</option>
              <option value="90" selected>Last 90 days</option>
              <option value="180">Last 180 days</option>
              <option value="365">Last 365 days</option>
            </select>

            <input type="number" min="0" value="0" step="100" data-filter-min-impressions placeholder="Min impressions" />
            <input type="search" data-filter-search placeholder="Search posts" />
          </section>

          <section class="panel table-panel">
            <header class="panel-head">
              <h3>Posts</h3>
              <p data-table-summary>0 matching posts</p>
            </header>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Post</th>
                    <th>Published</th>
                    <th>Type</th>
                    <th>Origin</th>
                    <th>Impressions</th>
                    <th>Reactions</th>
                    <th>Comments</th>
                    <th>Reposts</th>
                    <th>ER</th>
                  </tr>
                </thead>
                <tbody data-post-rows></tbody>
              </table>
            </div>
          </section>

        <section class="panel detail-panel" data-detail-panel>
          <header class="panel-head">
            <h3>Post Details</h3>
            <p>Click a row to inspect metrics</p>
          </header>
          <div class="detail-body" data-detail-body>
            <p class="empty-copy">No post selected yet.</p>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
